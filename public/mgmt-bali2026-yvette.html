<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bali Admin 🌴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f7f8fb; color:#0b1220; min-height:100vh; padding:24px 20px; }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .header h1 { font-size:20px; font-weight:700; }
    .header p { font-size:13px; color:#888; }
    .section-label { font-size:11px; font-weight:600; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin:24px 0 10px; }
    .card { background:white; border:1px solid rgba(16,24,32,0.06); border-radius:16px; padding:16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
    .card-info { flex:1; }
    .card-name { font-size:15px; font-weight:600; }
    .card-email { font-size:13px; color:#888; margin-top:2px; }
    .card-time { font-size:11px; color:#bbb; margin-top:4px; }
    .btn { padding:8px 16px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:inherit; }
    .btn-approve { background:#e8f5e9; color:#1b7a3e; }
    .btn-reject { background:#fce4e4; color:#c0392b; margin-left:6px; }
    .btn-google { display:inline-flex; align-items:center; gap:8px; padding:12px 20px; background:white; border:1px solid #ddd; border-radius:12px; font-size:14px; font-weight:500; cursor:pointer; }
    .empty { color:#aaa; font-size:14px; padding:16px 0; }
    #login-section { max-width:360px; margin:80px auto; text-align:center; }
    #login-section h2 { font-size:20px; font-weight:700; margin-bottom:8px; }
    #login-section p { color:#888; font-size:14px; margin-bottom:32px; }
    #app-section { display:none; max-width:560px; margin:0 auto; }
    .user-bar { display:flex; align-items:center; gap:10px; background:white; border:1px solid rgba(16,24,32,0.06); border-radius:12px; padding:10px 14px; margin-bottom:24px; }
    .user-bar img { width:32px; height:32px; border-radius:50%; }
    .user-bar span { flex:1; font-size:13px; font-weight:500; }
    .user-bar button { background:none; border:1px solid #ddd; border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer; }
  </style>
</head>
<body>

<div id="login-section">
  <div style="font-size:48px;margin-bottom:16px;">🌴</div>
  <h2>Bali Admin</h2>
  <p>管理者登入以審核行程存取申請</p>
  <div id="g_id_onload"
    data-client_id="1034860792560-8dgtqhaphq9rm7g0orc54co7adli0t2o.apps.googleusercontent.com"
    data-callback="handleAdminLogin"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="signin_with"
    data-shape="rectangular"
    data-logo_alignment="left"
    data-width="280"
    style="display:inline-block;margin-top:8px;">
  </div>
  <p id="login-status" style="margin-top:16px;font-size:13px;color:#e53935;"></p>
</div>

<div id="app-section">
  <div class="header">
    <span style="font-size:32px;">🌴</span>
    <div>
      <h1>Bali Admin</h1>
      <p>存取申請管理</p>
    </div>
  </div>
  <div class="user-bar">
    <img id="admin-avatar" src="" alt="" />
    <span id="admin-name"></span>
    <button onclick="adminLogout()">登出</button>
  </div>

  <div class="section-label">待審核 <span id="pending-count"></span></div>
  <div id="pending-list"></div>

  <div class="section-label">已核准</div>
  <div id="approved-list"></div>

  <div class="section-label">已拒絕</div>
  <div id="rejected-list"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
let adminEmail = null;
let adminToken = null;

async function handleAdminLogin(response) {
  adminToken = response.credential;
  document.getElementById("login-status").textContent = "驗證中...";

  const res = await fetch("/api/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "verify", token: adminToken })
  });
  const data = await res.json();

  if (data.status !== "approved" || data.user?.role !== "admin") {
    document.getElementById("login-status").textContent = "⛔ 你不是管理者，無法存取此頁面。";
    return;
  }

  adminEmail = data.user.email;
  document.getElementById("admin-avatar").src = data.user.picture || "";
  document.getElementById("admin-name").textContent = data.user.name + " (" + adminEmail + ")";
  document.getElementById("login-section").style.display = "none";
  document.getElementById("app-section").style.display = "block";

  loadList();
}

async function loadList() {
  const res = await fetch("/api/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "list", email: adminEmail })
  });
  const data = await res.json();

  renderPending(data.pending || []);
  renderApproved(data.approved || []);
  renderRejected(data.rejected || []);
}

function renderPending(list) {
  const el = document.getElementById("pending-list");
  document.getElementById("pending-count").textContent = list.length ? `(${list.length})` : "";
  if (!list.length) { el.innerHTML = '<p class="empty">目前沒有待審核申請</p>'; return; }
  el.innerHTML = list.map(u => `
    <div class="card">
      <div class="card-info">
        <div class="card-name">${u.name || ""}</div>
        <div class="card-email">${u.email}</div>
        <div class="card-time">${u.requestedAt ? new Date(u.requestedAt).toLocaleString("zh-TW") : ""}</div>
      </div>
      <select id="role-${u.email}" style="padding:8px 10px;border:1px solid #ddd;border-radius:10px;font-size:13px;min-width:92px;background:white;">
        <option value="viewer">viewer</option>
        <option value="editor">editor</option>
        <option value="admin">admin</option>
      </select>
      <button class="btn btn-approve" onclick="approveWithSelectedRole('${u.email}')">✓ 核准</button>
      <button class="btn btn-reject" onclick="reject('${u.email}')">✕ 拒絕</button>
    </div>
  `).join("");
}

function getEntryEmail(entry) {
  return typeof entry === "string" ? entry : (entry?.email || "");
}

function getEntryRole(entry) {
  return typeof entry === "object" && entry?.role ? entry.role : "editor";
}

function getEntryName(entry) {
  return typeof entry === "object" ? (entry?.name || "") : "";
}

function renderApproved(list) {
  const el = document.getElementById("approved-list");
  if (!list.length) { el.innerHTML = '<p class="empty">無</p>'; return; }
  el.innerHTML = list.map(entry => {
    const email = getEntryEmail(entry);
    const role = getEntryRole(entry);
    const name = getEntryName(entry);
    const isSelf = email === adminEmail;
    return `
    <div class="card">
      <div class="card-info">
        ${name ? `<div class="card-name">${name}</div>` : ""}
        <div class="card-email">${email}</div>
        <div class="card-time">目前角色：${role}</div>
      </div>
      ${isSelf ? '<span style="font-size:12px;color:#aaa;">管理者</span>' : `
        <select id="approved-role-${email}" style="padding:8px 10px;border:1px solid #ddd;border-radius:10px;font-size:13px;min-width:92px;background:white;">
          <option value="viewer" ${role === 'viewer' ? 'selected' : ''}>viewer</option>
          <option value="editor" ${role === 'editor' ? 'selected' : ''}>editor</option>
          <option value="admin" ${role === 'admin' ? 'selected' : ''}>admin</option>
        </select>
        <button class="btn btn-approve" onclick="updateApprovedRole('${email}')">更新權限</button>
        <button class="btn btn-reject" onclick="reject('${email}')">撤銷</button>
      `}
    </div>
  `}).join("");
}

function renderRejected(list) {
  const el = document.getElementById("rejected-list");
  if (!list.length) { el.innerHTML = '<p class="empty">無</p>'; return; }
  el.innerHTML = list.map(entry => {
    const email = getEntryEmail(entry);
    return `
    <div class="card">
      <div class="card-info"><div class="card-email">${email}</div></div>
      <select id="rejected-role-${email}" style="padding:8px 10px;border:1px solid #ddd;border-radius:10px;font-size:13px;min-width:92px;background:white;">
        <option value="viewer">viewer</option>
        <option value="editor">editor</option>
        <option value="admin">admin</option>
      </select>
      <button class="btn btn-approve" onclick="reapproveWithSelectedRole('${email}')">重新核准</button>
    </div>
  `}).join("");
}

async function approve(targetEmail, role = "viewer") {
  await fetch("/api/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "approve", email: adminEmail, targetEmail, role })
  });
  loadList();
}

function approveWithSelectedRole(targetEmail) {
  const role = document.getElementById(`role-${targetEmail}`)?.value || 'viewer';
  return approve(targetEmail, role);
}

function reapproveWithSelectedRole(targetEmail) {
  const role = document.getElementById(`rejected-role-${targetEmail}`)?.value || 'viewer';
  return approve(targetEmail, role);
}

function updateApprovedRole(targetEmail) {
  const role = document.getElementById(`approved-role-${targetEmail}`)?.value || 'viewer';
  return approve(targetEmail, role);
}

async function reject(targetEmail) {
  await fetch("/api/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "reject", email: adminEmail, targetEmail })
  });
  loadList();
}

function adminLogout() {
  location.reload();
}
</script>
</body>
</html>
